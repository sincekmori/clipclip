name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Include the runner image version in the cache key so a runner-image
          # (e.g. Xcode) update invalidates the cache. Otherwise a restored
          # `target/` keeps stale C-dependency linker paths from the previous
          # image (libopus / onnxruntime, clang_rt.osx) and the macOS link step
          # fails with "library 'clang_rt.osx' not found".
          #
          # `env-vars` hashes the *values* of these runner-set variables into the
          # key. A `${{ env.ImageVersion }}` expression does NOT work here: the
          # `env` context only exposes workflow-defined vars, not runner-injected
          # ones like ImageVersion, so it resolves to an empty (no-op) key.
          env-vars: "ImageOS ImageVersion"
      # ALSA headers are needed to build cpal on Linux. CMake (for the `opus`
      # feature's vendored libopus) is preinstalled on the GitHub runners.
      - name: install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test (all features)
        run: cargo test --all-features
      - name: doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: build (no default features — WAV only, no native codec deps)
        run: cargo build --no-default-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@v1.47.2
